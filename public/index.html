<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA (讓手機可以把網頁加入主畫面變成 APP) 設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#dc2626"> <!-- 搭配主視覺顏色 -->
    <!-- APP Icon (使用隨機海賊風或羅盤Icon做代表) -->
    <link rel="apple-touch-icon" href="https://img.icons8.com/plasticine/120/compass--v2.png">

    <title>九州 7天6夜 偉大航道之旅</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'] },
                    colors: {
                        primary: '#dc2626', secondary: '#eab308', ocean: '#0284c7', 
                        wood: { 500: '#a16207', 700: '#713f12', 800: '#451a03', 900: '#290f01' },
                        parchment: { 100: '#fef3c7', 200: '#fde68a', 300: '#fcd34d' }
                    },
                    boxShadow: { 'wanted': '4px 4px 0px rgba(69, 26, 3, 1)', 'wanted-sm': '2px 2px 0px rgba(69, 26, 3, 1)', 'nav': '0 -4px 15px rgba(0, 0, 0, 0.15)' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-800 text-wood-800 antialiased font-sans selection:bg-secondary selection:text-wood-900">

    <div id="app-container" class="relative max-w-md mx-auto h-[100dvh] bg-[url('https://www.transparenttextures.com/patterns/cream-paper.png')] bg-parchment-100 overflow-hidden flex flex-col shadow-2xl sm:border-4 sm:border-wood-800 sm:rounded-[2rem] sm:h-[90vh] sm:my-[5vh]">
        
        <!-- Header -->
        <header class="bg-primary border-b-4 border-wood-800 p-5 shadow-wanted z-10 shrink-0 relative overflow-hidden">
            <i class="ph-fill ph-skull absolute -right-6 -bottom-6 text-9xl text-white opacity-10 rotate-12"></i>
            <div class="flex justify-between items-center mb-5 relative z-10">
                <div>
                    <h1 class="text-3xl font-black tracking-widest text-secondary drop-shadow-[2px_2px_0_rgba(69,26,3,1)]">FUKUOKA</h1>
                    <p class="text-white font-bold mt-1 uppercase tracking-widest text-xs drop-shadow-[1px_1px_0_rgba(69,26,3,1)]">Kyushu Loop: 7 Days</p>
                </div>
                <!-- 船長設定按鈕 -->
                <div onclick="openSettingsModal()" class="w-12 h-12 rounded-full border-4 border-wood-800 bg-secondary flex items-center justify-center cursor-pointer shadow-wanted-sm transform transition hover:scale-105 hover:rotate-6 active:scale-95">
                    <i class="ph-fill ph-skull text-wood-800 text-xl"></i>
                </div>
            </div>
            
            <div class="bg-parchment-200 border-2 border-wood-800 rounded-xl p-3 flex justify-between items-center shadow-wanted-sm relative overflow-hidden">
                <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/wood-pattern.png')] opacity-10"></div>
                <div class="flex flex-col relative z-10">
                    <span class="text-xs font-black text-wood-700">起航出發</span>
                    <span class="font-black text-xl text-wood-900 mt-0.5">DAY 1</span>
                </div>
                <div class="flex flex-col items-center relative z-10">
                    <i class="ph-fill ph-boat text-primary text-2xl mb-1"></i>
                    <span class="text-[10px] bg-wood-800 text-secondary px-3 py-1 rounded-full font-black tracking-widest border-2 border-wood-900">千陽號</span>
                </div>
                <div class="flex flex-col text-right relative z-10">
                    <span class="text-xs font-black text-wood-700">滿載而歸</span>
                    <span class="font-black text-xl text-wood-900 mt-0.5">DAY 7</span>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto overflow-x-hidden p-5 pb-24 custom-scrollbar" id="main-content">
            
            <!-- VIEW: HOME (首頁) -->
            <div id="view-home" class="view-section active space-y-5">
                <div class="bg-parchment-200 border-2 border-wood-800 rounded-2xl p-4 shadow-wanted">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-primary border-4 border-wood-800 text-secondary flex items-center justify-center shadow-wanted-sm">
                            <i class="ph-fill ph-anchor text-3xl"></i>
                        </div>
                        <div>
                            <h2 class="text-sm text-wood-700 font-bold uppercase tracking-widest">距離偉大航道出發</h2>
                            <p class="text-2xl font-black text-wood-900 mt-1"><span id="countdown-days">--</span> <span class="text-sm font-bold text-wood-700">Days</span></p>
                        </div>
                    </div>
                </div>

                <div class="flex gap-4">
                    <!-- 氣象局方塊，加上點擊開啟天氣 Modal 的功能 -->
                    <div onclick="openWeatherModal()" class="cursor-pointer flex-1 bg-ocean border-2 border-wood-800 rounded-2xl p-4 text-white shadow-wanted relative overflow-hidden transform transition hover:scale-105 active:scale-95">
                        <i class="ph-fill ph-cloud-sun absolute -right-3 -bottom-3 text-7xl text-white opacity-40"></i>
                        <h3 class="text-sm font-black drop-shadow-md">娜美氣象局(福岡)</h3>
                        <div class="flex items-end gap-2 mt-2 relative z-10">
                            <span class="text-3xl font-black drop-shadow-md" id="home-weather-temp">--°</span>
                            <span class="text-xs mb-1 font-bold" id="home-weather-desc">連線中</span>
                        </div>
                    </div>
                    <div class="flex-1 bg-parchment-200 border-2 border-wood-800 rounded-2xl p-4 shadow-wanted flex flex-col justify-center relative">
                        <i class="ph-fill ph-coins absolute -right-2 -bottom-2 text-6xl text-wood-800 opacity-10"></i>
                        <h3 class="text-sm text-wood-700 font-black">目前匯率</h3>
                        <p class="text-xl font-black text-wood-900 mt-1"><span class="text-xs text-wood-500">¥1 = </span>0.21<span class="text-xs text-wood-500"> NTD</span></p>
                    </div>
                </div>

                <h3 class="text-lg font-black text-wood-900 mt-7 mb-3 border-b-4 border-primary inline-block pb-1">航海指令</h3>
                <div class="grid grid-cols-4 gap-3">
                    <button onclick="switchTab('itinerary'); changeDay(1);" class="flex flex-col items-center gap-2 group transform transition hover:-translate-y-1"><div class="w-14 h-14 rounded-xl bg-parchment-200 border-2 border-wood-800 shadow-wanted-sm flex items-center justify-center text-primary"><i class="ph-fill ph-scroll text-3xl"></i></div><span class="text-xs font-bold text-wood-800">入國許可</span></button>
                    <button onclick="openMapModal()" class="flex flex-col items-center gap-2 group transform transition hover:-translate-y-1"><div class="w-14 h-14 rounded-xl bg-parchment-200 border-2 border-wood-800 shadow-wanted-sm flex items-center justify-center text-primary"><i class="ph-fill ph-train-regional text-3xl"></i></div><span class="text-xs font-bold text-wood-800">海上列車</span></button>
                    <button onclick="switchTab('checklist')" class="flex flex-col items-center gap-2 group transform transition hover:-translate-y-1"><div class="w-14 h-14 rounded-xl bg-parchment-200 border-2 border-wood-800 shadow-wanted-sm flex items-center justify-center text-primary"><i class="ph-fill ph-storefront text-3xl"></i></div><span class="text-xs font-bold text-wood-800">裝備庫</span></button>
                    <button onclick="openSettingsModal()" class="flex flex-col items-center gap-2 group transform transition hover:-translate-y-1"><div class="w-14 h-14 rounded-xl bg-parchment-200 border-2 border-wood-800 shadow-wanted-sm flex items-center justify-center text-primary"><i class="ph-fill ph-tent text-3xl"></i></div><span class="text-xs font-bold text-wood-800">船長室</span></button>
                </div>
            </div>

            <!-- VIEW: ITINERARY (航海日誌) -->
            <div id="view-itinerary" class="view-section hidden space-y-4">
                <div class="flex justify-between items-end mb-5">
                    <h2 class="text-2xl font-black text-wood-900 drop-shadow-sm">航海日誌</h2>
                    <span onclick="openMapModal()" class="text-xs font-black text-wood-900 bg-secondary border-2 border-wood-800 px-3 py-1.5 rounded-full shadow-wanted-sm flex items-center cursor-pointer transition hover:-translate-y-1 active:scale-95"><i class="ph-fill ph-map-trifold mr-1"></i>偉大航道地圖</span>
                </div>
                
                <!-- Day Tabs (統一加入 border-2 與基礎樣式) -->
                <div class="flex overflow-x-auto gap-3 pb-4 hide-scrollbar px-1" id="day-tabs">
                    <button onclick="changeDay(1)" id="tab-day-1" class="day-tab shrink-0 px-4 py-2 rounded-xl text-center shadow-wanted transform transition -rotate-1 border-2"><p class="text-sm font-black">DAY 1</p></button>
                    <button onclick="changeDay(2)" id="tab-day-2" class="day-tab shrink-0 px-4 py-2 rounded-xl text-center shadow-wanted transform transition rotate-1 border-2"><p class="text-sm font-black">DAY 2</p></button>
                    <button onclick="changeDay(3)" id="tab-day-3" class="day-tab shrink-0 px-4 py-2 rounded-xl text-center shadow-wanted transform transition -rotate-1 border-2"><p class="text-sm font-black">DAY 3</p></button>
                    <button onclick="changeDay(4)" id="tab-day-4" class="day-tab shrink-0 px-4 py-2 rounded-xl text-center shadow-wanted transform transition rotate-1 border-2"><p class="text-sm font-black">DAY 4</p></button>
                    <button onclick="changeDay(5)" id="tab-day-5" class="day-tab shrink-0 px-4 py-2 rounded-xl text-center shadow-wanted transform transition -rotate-1 border-2"><p class="text-sm font-black">DAY 5</p></button>
                    <button onclick="changeDay(6)" id="tab-day-6" class="day-tab shrink-0 px-4 py-2 rounded-xl text-center shadow-wanted transform transition rotate-1 border-2"><p class="text-sm font-black">DAY 6</p></button>
                    <button onclick="changeDay(7)" id="tab-day-7" class="day-tab shrink-0 px-4 py-2 rounded-xl text-center shadow-wanted transform transition -rotate-1 border-2"><p class="text-sm font-black">DAY 7</p></button>
                </div>
                
                <!-- Timeline List -->
                <div class="relative pl-7 pt-2 space-y-7" id="itinerary-list">
                    <p class="text-center font-bold text-wood-600 py-6">載入中...</p>
                </div>
                
                <button onclick="openItineraryAddModal()" class="w-full bg-white/50 border-2 border-dashed border-wood-600 text-wood-800 font-black py-3 rounded-xl hover:bg-white/80 transition mt-6 shadow-sm active:scale-95">
                    <i class="ph-bold ph-plus mr-1"></i> 新增航點
                </button>
            </div>

            <!-- VIEW: CHECKLIST (裝備庫) -->
            <div id="view-checklist" class="view-section hidden space-y-4">
                <div class="flex justify-between items-end mb-5">
                    <h2 class="text-2xl font-black text-wood-900 drop-shadow-sm">裝備庫</h2>
                    <span class="text-xs font-black text-wood-900 bg-secondary border-2 border-wood-800 px-3 py-1.5 rounded-full shadow-wanted-sm">打點行囊</span>
                </div>
                
                <div class="bg-white/80 border-2 border-wood-800 p-4 rounded-xl shadow-wanted mb-4">
                    <div class="flex gap-2">
                        <input type="text" id="checklist-input" placeholder="新增裝備 (例：行動電源)" class="flex-1 border-b-2 border-wood-500 bg-transparent px-2 py-1 font-bold text-wood-900 focus:outline-none focus:border-primary">
                        <button onclick="addChecklistItem()" class="bg-primary hover:bg-wood-900 text-white font-bold p-2 text-xl rounded transition shadow-sm active:scale-95"><i class="ph-bold ph-plus"></i></button>
                    </div>
                </div>

                <div id="checklist-list" class="space-y-3 pb-8"></div>
            </div>

            <!-- VIEW: EXPENSES (金庫記帳) -->
            <div id="view-expenses" class="view-section hidden space-y-6">
                <!-- BUDGET CARD -->
                <div class="bg-[#e4cb98] border-8 border-wood-800 p-6 shadow-wanted relative overflow-hidden text-center">
                    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/aged-paper.png')] opacity-50 mixing-blend-multiply"></div>
                    <h2 class="text-3xl font-black text-wood-900 tracking-widest relative z-10 font-[serif] border-b-2 border-wood-800 pb-2 mb-3 inline-block">WANTED</h2>
                    <p class="text-xs font-bold text-wood-700 tracking-widest relative z-10 mb-1 block">目前已花費資金 (JPY)</p>
                    <div class="text-5xl font-black text-wood-900 my-4 tracking-tighter relative z-10 drop-shadow-[1px_1px_0_#fff]">
                        <span class="text-2xl mr-1">฿</span><span id="expense-total">--</span>
                    </div>
                    <div class="flex justify-between text-xs font-black tracking-widest text-wood-800 mt-4 relative z-10 bg-white/30 p-2 rounded border border-wood-800">
                        <span>總金庫: ฿<span id="expense-budget">--</span></span>
                        <span class="text-primary">結餘: ฿<span id="expense-left">--</span></span>
                    </div>
                </div>

                <div class="flex justify-between items-center mt-6">
                    <h3 class="text-lg font-black text-wood-900 border-l-4 border-primary pl-2">敗家紀錄</h3>
                    <button onclick="openExpenseModal()" class="bg-secondary border-2 border-wood-800 text-wood-900 text-sm font-black px-3 py-1 flex items-center shadow-wanted-sm transform transition hover:-translate-y-1 active:scale-95"><i class="ph-bold ph-plus mr-1"></i>新添一筆</button>
                </div>

                <div id="expense-list" class="space-y-4"></div>
            </div>
        </main>

        <!-- MODAL: 新增/編輯金庫花費 -->
        <div id="expense-modal" class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center hidden">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeExpenseModal()"></div>
            <div class="bg-parchment-100 w-full max-w-md p-6 rounded-t-3xl sm:rounded-3xl border-t-4 sm:border-4 border-wood-800 shadow-wanted relative z-10 transition-transform duration-300 transform translate-y-full" id="expense-modal-content">
                <div class="flex justify-between items-end mb-4 border-b-2 border-wood-800 pb-2">
                    <h3 class="text-2xl font-black text-wood-900" id="expense-modal-title">新紀錄</h3>
                    <button id="btn-delete-expense" onclick="deleteExpense()" class="hidden text-primary font-black hover:scale-110 active:scale-95 transition flex items-center text-sm bg-red-100 px-3 py-1 rounded border border-red-300"><i class="ph-fill ph-skull mr-1"></i>放棄紀錄</button>
                </div>
                <div class="space-y-4">
                    <input type="hidden" id="expense-id">
                    <div><label class="block text-sm font-bold text-wood-700 mb-1">項目</label><input type="text" id="expense-title" class="w-full bg-white border-2 border-wood-500 rounded p-2 font-bold" autocomplete="off"></div>
                    <div><label class="block text-sm font-bold text-wood-700 mb-1">金額 (¥)</label><input type="number" id="expense-amount" class="w-full bg-white border-2 border-wood-500 rounded p-2 font-bold"></div>
                    <button onclick="submitExpense()" class="w-full bg-primary border-4 border-wood-900 text-secondary font-black text-xl py-3 rounded-xl hover:bg-red-700 active:translate-y-1 active:shadow-none mt-4 transition">記錄進金庫！</button>
                </div>
                <button onclick="closeExpenseModal()" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center bg-wood-200 border-2 border-wood-800 text-wood-900 rounded-full font-bold">X</button>
            </div>
        </div>

        <!-- MODAL: 娜美氣象局詳細 -->
        <div id="weather-modal" class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center hidden">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeWeatherModal()"></div>
            <div class="bg-ocean w-full max-w-md p-6 rounded-t-3xl sm:rounded-3xl border-t-4 sm:border-4 border-wood-800 shadow-wanted relative z-10 transition-transform duration-300 transform translate-y-full" id="weather-modal-content">
                <h3 class="text-2xl font-black text-white mb-4 border-b-2 border-white/30 pb-2 flex items-center"><i class="ph-fill ph-cloud-sun mr-2"></i>娜美氣象局 - 福岡縣</h3>
                <div class="bg-white/10 p-4 rounded-xl border-2 border-white/20 text-white space-y-3">
                    <p class="text-sm font-bold opacity-80 mb-1">即時氣候資訊</p>
                    <div class="flex justify-between items-center text-xl font-black border-b border-white/20 pb-2"><span id="weather-desc">讀取中...</span> <span class="text-4xl" id="weather-temp">--°C</span></div>
                    <div class="flex justify-between items-center text-sm font-bold"><span class="opacity-80">降雨狀態</span> <span id="weather-precip">--</span></div>
                </div>
                <button onclick="closeWeatherModal()" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center bg-white/20 text-white rounded-full font-bold hover:bg-white/40">X</button>
            </div>
        </div>

        <!-- MODAL: 新增航程景點 -->
        <div id="itinerary-add-modal" class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center hidden">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeItineraryAddModal()"></div>
            <div class="bg-parchment-100 w-full max-w-md p-6 rounded-t-3xl sm:rounded-3xl border-t-4 sm:border-4 border-wood-800 shadow-wanted relative z-10 transition-transform duration-300 transform translate-y-full" id="itinerary-add-modal-content">
                <h3 class="text-2xl font-black text-wood-900 mb-4 border-b-2 border-wood-800 pb-2" id="add-itin-modal-title">新增/編輯航點</h3>
                <input type="hidden" id="add-itin-id">
                <div class="space-y-3">
                    <div class="flex gap-3">
                        <div class="w-1/3"><label class="block text-sm font-bold text-wood-700 mb-1">時間</label><input type="time" id="add-itin-time" class="w-full bg-white border-2 border-wood-500 rounded p-2 font-bold" value="10:00"></div>
                        <div class="w-2/3"><label class="block text-sm font-bold text-wood-700 mb-1">景點或活動名稱</label><input type="text" id="add-itin-title" class="w-full bg-white border-2 border-wood-500 rounded p-2 font-bold" placeholder="天神購物..."></div>
                    </div>
                    <div><label class="block text-sm font-bold text-wood-700 mb-1">敘述/備忘錄</label><input type="text" id="add-itin-desc" class="w-full bg-white border-2 border-wood-500 rounded p-2 font-bold" placeholder="搭乘地鐵..."></div>
                    <div><label class="block text-sm font-bold text-wood-700 mb-1">照片網址 (選填)</label><input type="url" id="add-itin-img" class="w-full bg-white border-2 border-wood-500 rounded p-2 font-bold text-xs" placeholder="https://..."></div>
                    <button onclick="submitItinerary()" class="w-full bg-secondary border-4 border-wood-900 text-wood-900 font-black text-xl py-3 rounded-xl active:translate-y-1 mt-4 transition">下錨確認！</button>
                </div>
                <button onclick="closeItineraryAddModal()" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center bg-wood-200 border-2 border-wood-800 text-wood-900 rounded-full font-bold">X</button>
            </div>
        </div>

        <!-- MODAL: 景點詳情與圖片預覽 -->
        <div id="itinerary-detail-modal" class="fixed inset-0 z-[70] flex items-center justify-center hidden p-4">
            <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeItineraryDetail()"></div>
            <div class="bg-white w-full max-w-sm mx-auto rounded-[2rem] border-4 border-wood-800 shadow-[8px_8px_0_rgba(69,26,3,1)] relative z-10 overflow-hidden scale-95 opacity-0 transition-all duration-300 flex flex-col" id="itinerary-detail-content">
                <button onclick="closeItineraryDetail()" class="absolute top-3 right-3 w-8 h-8 flex items-center justify-center bg-black/50 text-white rounded-full font-bold z-20 backdrop-blur hover:bg-black/70 transition">X</button>
                
                <div class="h-64 bg-gray-200 relative shrink-0">
                    <!-- 圖片會顯示在此 -->
                    <img id="detail-img" src="" alt="View" class="w-full h-full object-cover">
                    <!-- 漸層黑色遮罩讓字體清晰 -->
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent flex flex-col justify-end p-5">
                        <span id="detail-time" class="text-secondary font-black text-sm drop-shadow-md mb-1"></span>
                        <h2 id="detail-title" class="text-white text-3xl font-black drop-shadow-md leading-tight"></h2>
                    </div>
                </div>
                
                <div class="p-6 bg-parchment-100 flex-1 flex flex-col">
                    <p id="detail-desc" class="text-wood-800 font-bold mb-6 text-sm flex-1"></p>
                    <div class="mt-auto pt-4 border-t-2 border-wood-300 flex justify-end gap-4">
                        <button onclick="editCurrentItinerary()" class="flex items-center gap-1 text-ocean font-bold text-xs hover:text-blue-700 transition active:scale-95">
                            <i class="ph-bold ph-pencil text-sm"></i> 編輯
                        </button>
                        <button id="btn-delete-itin" class="flex items-center gap-1 text-red-500 font-bold text-xs hover:text-red-700 transition active:scale-95">
                            <i class="ph-bold ph-trash text-sm"></i> 刪除此景點
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- MODAL: 偉大航道地圖 (Google Map iframe) -->
        <div id="map-modal" class="fixed inset-0 z-[70] flex items-center justify-center hidden p-4">
            <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeMapModal()"></div>
            <div class="bg-wood-800 w-full max-w-md h-[80vh] rounded-3xl border-4 border-secondary shadow-[8px_8px_0_rgba(234,179,8,1)] relative z-10 overflow-hidden scale-95 opacity-0 transition-all duration-300 flex flex-col" id="map-modal-content">
                <div class="bg-wood-900 p-3 flex justify-between items-center text-secondary border-b-2 border-secondary">
                    <h3 class="font-black tracking-widest flex items-center"><i class="ph-fill ph-map-trifold mr-2 text-xl"></i>偉大航道總覽</h3>
                    <button onclick="closeMapModal()" class="w-8 h-8 flex items-center justify-center bg-white/10 rounded-full font-bold hover:bg-white/30">X</button>
                </div>
                <div class="flex-1 bg-white relative">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1692226.790518779!2d129.54924296225762!3d32.74797087090886!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x35418df419cc5b1b%3A0xe5edde6ceac6bf63!2sKyushu!5e0!3m2!1sen!2stw!4v1711200000000!5m2!1sen!2stw" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </div>

        <!-- MODAL: Settings 船長設定 -->
        <div id="settings-modal" class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center hidden">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeSettingsModal()"></div>
            <div class="bg-parchment-200 w-full max-w-md p-6 rounded-t-3xl sm:rounded-3xl border-t-4 sm:border-4 border-wood-800 shadow-wanted relative z-10 transition-transform duration-300 transform translate-y-full" id="settings-modal-content">
                <h3 class="text-2xl font-black text-wood-900 mb-4 border-b-2 border-wood-800 pb-2 flex items-center"><i class="ph-fill ph-skull mr-2 text-primary"></i>船長室</h3>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <label class="block text-sm font-bold text-wood-700">金庫總預算 (日圓)</label>
                            <span class="text-xs font-black text-primary bg-red-100 px-2 rounded" id="setting-budget-twd">約 NT$ --</span>
                        </div>
                        <input type="number" id="setting-budget" oninput="updateSettingBudgetTWD()" class="w-full bg-white border-2 border-wood-500 rounded p-2 font-bold focus:outline-none focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-wood-700 mb-1">出發航向日</label>
                        <input type="date" id="setting-date" class="w-full bg-white border-2 border-wood-500 rounded p-2 font-bold focus:outline-none focus:border-primary">
                    </div>
                    <button onclick="saveSettings()" class="w-full bg-wood-800 text-white font-black text-lg py-3 rounded-xl hover:bg-wood-900 active:scale-95 mt-4 transition border-2 border-wood-900">
                        更新航海計畫
                    </button>
                </div>
                <button onclick="closeSettingsModal()" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center bg-wood-500 text-white rounded-full font-bold hover:bg-wood-700">X</button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bg-wood-800 text-parchment-200 border-t-4 border-wood-900 pb-safe pt-2 px-6 absolute bottom-0 w-full z-20 shadow-nav">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/wood-pattern.png')] opacity-30 pointer-events-none"></div>
            <div class="flex justify-between items-center pb-2 relative z-10">
                <button onclick="switchTab('home')" class="nav-btn flex flex-col items-center p-2 pt-3 w-16 text-primary active" data-target="view-home">
                    <i class="ph-fill ph-anchor text-2xl mb-1 icon-active drop-shadow-md"></i><span class="text-[10px] font-black tracking-widest">甲板</span>
                </button>
                <button onclick="switchTab('itinerary')" class="nav-btn flex flex-col items-center p-2 pt-3 w-16 text-parchment-200 opacity-60 hover:opacity-100 transition" data-target="view-itinerary">
                    <i class="ph-fill ph-compass text-2xl mb-1 icon-active drop-shadow-md"></i><span class="text-[10px] font-black tracking-widest">日誌</span>
                </button>
                <div class="relative -top-7 group cursor-pointer" onclick="openExpenseModal()">
                    <button class="w-16 h-16 bg-secondary text-wood-900 rounded-full shadow-wanted flex items-center justify-center border-4 border-wood-900 transform transition-transform group-hover:rotate-45 active:rotate-90">
                        <i class="ph-fill ph-steering-wheel text-4xl"></i>
                    </button>
                </div>
                <button onclick="switchTab('expenses')" class="nav-btn flex flex-col items-center p-2 pt-3 w-16 text-parchment-200 opacity-60 hover:opacity-100 transition" data-target="view-expenses">
                    <i class="ph-fill ph-coins text-2xl mb-1 icon-active drop-shadow-md"></i><span class="text-[10px] font-black tracking-widest">金庫</span>
                </button>
                <button onclick="switchTab('checklist')" class="nav-btn flex flex-col items-center p-2 pt-3 w-16 text-parchment-200 opacity-60 hover:opacity-100 transition" data-target="view-checklist">
                    <i class="ph-fill ph-gear text-2xl mb-1 icon-active drop-shadow-md"></i><span class="text-[10px] font-black tracking-widest">裝備</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- 腳本獨立載入 -->
    <script src="app.js"></script>
</body>
</html>
